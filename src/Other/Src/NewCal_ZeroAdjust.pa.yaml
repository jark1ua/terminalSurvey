Screens:
  NewCal_ZeroAdjust:
    Properties:
      Fill: =RGBA(243, 242, 241, 1)
      LoadingSpinnerColor: =RGBA(0, 51, 102, 1)
      OnVisible: =Set(varCalStep, 3)
    Children:
      - NCZHeaderBar:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(0, 120, 212, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =80
            PaddingLeft: =100
            Size: =20
            Text: ="New Calibration — Zero Adjust"
            Width: =Parent.Width
      - NCZBackButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(255, 255, 255, 0.4)
            BorderThickness: =1
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(255, 255, 255, 0.1)
            OnSelect: =Back()
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(255, 255, 255, 0.2)
            Size: =13
            Text: ="<  Back"
            Width: =80
            X: =16
            Y: =20
      - NCZStepText:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =30
            PaddingRight: =20
            Text: =If(IsBlank(varCalAsset), "Step 3 of 4 — Zero Adjust", "Step 3 of 4 — " & varCalAsset.Title)
            Width: =500
            X: =Parent.Width - Self.Width
            Y: =25
      - NCZStep1Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(0, 120, 212, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =Min((Parent.Width - 80) / 4, 180)
            X: =(Parent.Width - Self.Width * 4 - 24) / 2
            Y: =NCZHeaderBar.Y + NCZHeaderBar.Height + 12
      - NCZStep2Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(0, 120, 212, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =NCZStep1Dot.Width
            X: =NCZStep1Dot.X + NCZStep1Dot.Width + 8
            Y: =NCZStep1Dot.Y
      - NCZStep3Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(0, 120, 212, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =NCZStep1Dot.Width
            X: =NCZStep2Dot.X + NCZStep2Dot.Width + 8
            Y: =NCZStep1Dot.Y
      - NCZStep4Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(225, 223, 221, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =NCZStep1Dot.Width
            X: =NCZStep3Dot.X + NCZStep3Dot.Width + 8
            Y: =NCZStep1Dot.Y
      - NCZContentBg:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Open Sans'
            Height: =Parent.Height - NCZHeaderBar.Height - 40
            Size: =14
            Text: =""
            Width: =Min(Parent.Width, 700)
            X: =(Parent.Width - Self.Width) / 2
            Y: =NCZHeaderBar.Y + NCZHeaderBar.Height + 40
      - NCZReadingCard:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =170
            Size: =14
            Text: =""
            Width: =NCZContentBg.Width - 40
            X: =NCZContentBg.X + 20
            Y: =NCZContentBg.Y
      - NCZReadingTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(50, 49, 48, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =30
            Size: =16
            Text: ="Observed Output at Zero Input"
            Width: =NCZReadingCard.Width - 40
            X: =NCZReadingCard.X + 20
            Y: =NCZReadingCard.Y + 16
      - NCZReadingHint:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =20
            Size: =12
            Text: ="Expected 4 mA at zero input. Enter what the instrument actually outputs."
            Width: =NCZReadingCard.Width - 40
            X: =NCZReadingCard.X + 20
            Y: =NCZReadingTitle.Y + NCZReadingTitle.Height + 2
      - NCZeroReading:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(50, 49, 48, 1)
            Default: =""
            DisabledBorderColor: =ColorFade(Self.BorderColor, 40%)
            DisabledColor: =ColorFade(Self.Color, 40%)
            DisabledFill: =Self.Fill
            FocusedBorderThickness: =3
            Font: =Font.'Segoe UI'
            Format: =TextFormat.Number
            Height: =54
            HintText: ="e.g. 4.20"
            HoverBorderColor: =Self.Color
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            Size: =18
            Width: =NCZReadingCard.Width - 40
            X: =NCZReadingCard.X + 20
            Y: =NCZReadingHint.Y + NCZReadingHint.Height + 14
      - NCZDriftCard:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =130
            Size: =14
            Text: =""
            Width: =NCZContentBg.Width - 40
            X: =NCZContentBg.X + 20
            Y: =NCZReadingCard.Y + NCZReadingCard.Height + 20
      - NCZDriftTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =22
            Size: =11
            Text: ="DRIFT FROM 4 mA"
            Width: =NCZDriftCard.Width - 40
            X: =NCZDriftCard.X + 20
            Y: =NCZDriftCard.Y + 14
      - NCZDriftValue:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: |-
              =With(
                  { a: 4 - Coalesce(Value(NCZeroReading.Text), 4) },
                  If(a = 0, RGBA(50, 49, 48, 1),
                     If(a > 0, RGBA(0, 120, 212, 1), RGBA(196, 49, 75, 1)))
              )
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =44
            Size: =28
            Text: |-
              =If(IsBlank(NCZeroReading.Text),
                  "—",
                  Text(4 - Coalesce(Value(NCZeroReading.Text), 4), "+0.0000; -0.0000; 0.0000") & " mA"
              )
            Width: =NCZDriftCard.Width - 40
            X: =NCZDriftCard.X + 20
            Y: =NCZDriftTitle.Y + NCZDriftTitle.Height + 4
      - NCZDriftHint:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =22
            Size: =11
            Text: |-
              =With(
                  { a: 4 - Coalesce(Value(NCZeroReading.Text), 4) },
                  If(IsBlank(NCZeroReading.Text), "",
                  If(a = 0, "On target.",
                  If(a > 0, "Reading is low — adjust up by this amount.", "Reading is high — adjust down by this amount.")))
              )
            Width: =NCZDriftCard.Width - 40
            X: =NCZDriftCard.X + 20
            Y: =NCZDriftValue.Y + NCZDriftValue.Height + 4
      - NCZNextButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =RGBA(225, 223, 221, 1)
            DisplayMode: =If(IsBlank(NCZeroReading.Text), DisplayMode.Disabled, DisplayMode.Edit)
            Fill: =RGBA(0, 120, 212, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(16, 110, 190, 1)
            OnSelect: |-
              =Set(varAbsError, Abs(Coalesce(Value(NCZeroReading.Text), 4) - 4));
              Set(varErrorPctSpan, varAbsError / 16 * 100);
              Set(varNewLRV, "");
              Set(varNewURV, "");
              Navigate(NewCal_Equipment, ScreenTransition.None)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(0, 90, 158, 1)
            Text: |-
              ="Next: Equipment  >"
            Width: =(NCZContentBg.Width - 60) / 2
            X: =NCZContentBg.X + 40 + (NCZContentBg.Width - 60) / 2
            Y: =NCZDriftCard.Y + NCZDriftCard.Height + 20
      - NCZPrevButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(50, 49, 48, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(247, 247, 246, 1)
            OnSelect: =Back()
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(237, 237, 236, 1)
            Text: ="<  Previous"
            Width: =(NCZContentBg.Width - 60) / 2
            X: =NCZContentBg.X + 20
            Y: =NCZNextButton.Y
