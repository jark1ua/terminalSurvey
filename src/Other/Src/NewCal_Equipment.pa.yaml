            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =30
            PaddingRight: =20
            Text: =If(IsBlank(varCalAsset), "Step 4 of 4 — Equipment & Submit", "Step 4 of 4 — " & varCalType & " — " & varCalAsset.Title)
            Width: =500
            X: =Parent.Width - Self.Width
            Y: =25
      - NCEStep1Dot:
