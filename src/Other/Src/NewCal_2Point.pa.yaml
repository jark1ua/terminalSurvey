Screens:
  NewCal_2Point:
    Properties:
      Fill: =RGBA(243, 242, 241, 1)
      LoadingSpinnerColor: =RGBA(0, 51, 102, 1)
      OnVisible: =Set(varCalStep, 3)
    Children:
      - NC2HeaderBar:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(16, 124, 16, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =80
            PaddingLeft: =100
            Size: =20
            Text: ="New Calibration"
            Width: =Parent.Width
      - NC2BackButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(255, 255, 255, 0.4)
            BorderThickness: =1
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(255, 255, 255, 0.1)
            OnSelect: =Back()
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(255, 255, 255, 0.2)
            Size: =13
            Text: ="<  Back"
            Width: =80
            X: =16
            Y: =20
      - NC2StepText:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =30
            PaddingRight: =20
            Text: =If(IsBlank(varCalAsset), "Step 3 of 4 — 2-Point", "Step 3 of 4 — 2-Point — " & varCalAsset.Title)
            Width: =500
            X: =Parent.Width - Self.Width
            Y: =25
      - NC2Step1Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(16, 124, 16, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =Min((Parent.Width - 80) / 4, 180)
            X: =(Parent.Width - Self.Width * 4 - 24) / 2
            Y: =NC2HeaderBar.Y + NC2HeaderBar.Height + 12
      - NC2Step2Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(16, 124, 16, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =NC2Step1Dot.Width
            X: =NC2Step1Dot.X + NC2Step1Dot.Width + 8
            Y: =NC2Step1Dot.Y
      - NC2Step3Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(16, 124, 16, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =NC2Step1Dot.Width
            X: =NC2Step2Dot.X + NC2Step2Dot.Width + 8
            Y: =NC2Step1Dot.Y
      - NC2Step4Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(225, 223, 221, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =NC2Step1Dot.Width
            X: =NC2Step3Dot.X + NC2Step3Dot.Width + 8
            Y: =NC2Step1Dot.Y
      - NC2ContentBg:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Open Sans'
            Height: =Parent.Height - NC2HeaderBar.Height - 40
            Size: =14
            Text: =""
            Width: =Min(Parent.Width, 760)
            X: =(Parent.Width - Self.Width) / 2
            Y: =NC2HeaderBar.Y + NC2HeaderBar.Height + 40
      - NC2GridCard:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =240
            Size: =14
            Text: =""
            Width: =NC2ContentBg.Width - 40
            X: =NC2ContentBg.X + 20
            Y: =NC2ContentBg.Y
      - NC2GridTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(50, 49, 48, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =30
            Size: =16
            Text: ="Two-Point Calibration"
            Width: =NC2GridCard.Width - 40
            X: =NC2GridCard.X + 20
            Y: =NC2GridCard.Y + 16
      - NC2GridHint:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =20
            Size: =12
            Text: |-
              ="Units-agnostic: enter the expected reference value and the measured reading at each of the two points (e.g. pH 4 and pH 7)."
            Width: =NC2GridCard.Width - 40
            X: =NC2GridCard.X + 20
            Y: =NC2GridTitle.Y + NC2GridTitle.Height + 2
      - NC2ColHdrPoint:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(243, 242, 241, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =34
            Size: =11
            Text: =""
            Width: =100
            X: =NC2GridCard.X + 20
            Y: =NC2GridHint.Y + NC2GridHint.Height + 12
      - NC2ColHdrExpected:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(243, 242, 241, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =34
            Size: =11
            Text: ="EXPECTED"
            Width: =(NC2GridCard.Width - 40 - 100 - 16) / 2
            X: =NC2ColHdrPoint.X + NC2ColHdrPoint.Width + 16
            Y: =NC2ColHdrPoint.Y
      - NC2ColHdrMeasured:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(243, 242, 241, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =34
            Size: =11
            Text: ="MEASURED"
            Width: =NC2ColHdrExpected.Width
            X: =NC2ColHdrExpected.X + NC2ColHdrExpected.Width + 16
            Y: =NC2ColHdrPoint.Y
      - NC2P1Label:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(50, 49, 48, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =46
            Text: ="Point 1"
            Width: =100
            X: =NC2ColHdrPoint.X
            Y: =NC2ColHdrPoint.Y + NC2ColHdrPoint.Height + 8
      - NC2P1Expected:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(50, 49, 48, 1)
            Default: =""
            DisabledBorderColor: =ColorFade(Self.BorderColor, 40%)
            DisabledColor: =ColorFade(Self.Color, 40%)
            DisabledFill: =Self.Fill
            FocusedBorderThickness: =3
            Font: =Font.'Segoe UI'
            Format: =TextFormat.Number
            Height: =46
            HintText: ="e.g. 4"
            HoverBorderColor: =Self.Color
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            PaddingLeft: =10
            Size: =14
            Width: =NC2ColHdrExpected.Width
            X: =NC2ColHdrExpected.X
            Y: =NC2P1Label.Y
      - NC2P1Measured:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(50, 49, 48, 1)
            Default: =""
            DisabledBorderColor: =ColorFade(Self.BorderColor, 40%)
            DisabledColor: =ColorFade(Self.Color, 40%)
            DisabledFill: =Self.Fill
            FocusedBorderThickness: =3
            Font: =Font.'Segoe UI'
            Format: =TextFormat.Number
            Height: =46
            HintText: ="e.g. 4.02"
            HoverBorderColor: =Self.Color
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            PaddingLeft: =10
            Size: =14
            Width: =NC2ColHdrMeasured.Width
            X: =NC2ColHdrMeasured.X
            Y: =NC2P1Label.Y
      - NC2P2Label:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(50, 49, 48, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =46
            Text: ="Point 2"
            Width: =100
            X: =NC2ColHdrPoint.X
            Y: =NC2P1Label.Y + NC2P1Label.Height + 6
      - NC2P2Expected:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(50, 49, 48, 1)
            Default: =""
            DisabledBorderColor: =ColorFade(Self.BorderColor, 40%)
            DisabledColor: =ColorFade(Self.Color, 40%)
            DisabledFill: =Self.Fill
            FocusedBorderThickness: =3
            Font: =Font.'Segoe UI'
            Format: =TextFormat.Number
            Height: =46
            HintText: ="e.g. 7"
            HoverBorderColor: =Self.Color
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            PaddingLeft: =10
            Size: =14
            Width: =NC2ColHdrExpected.Width
            X: =NC2ColHdrExpected.X
            Y: =NC2P2Label.Y
      - NC2P2Measured:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(50, 49, 48, 1)
            Default: =""
            DisabledBorderColor: =ColorFade(Self.BorderColor, 40%)
            DisabledColor: =ColorFade(Self.Color, 40%)
            DisabledFill: =Self.Fill
            FocusedBorderThickness: =3
            Font: =Font.'Segoe UI'
            Format: =TextFormat.Number
            Height: =46
            HintText: ="e.g. 6.95"
            HoverBorderColor: =Self.Color
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            PaddingLeft: =10
            Size: =14
            Width: =NC2ColHdrMeasured.Width
            X: =NC2ColHdrMeasured.X
            Y: =NC2P2Label.Y
      - NC2ErrorCard:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =110
            Size: =14
            Text: =""
            Width: =NC2ContentBg.Width - 40
            X: =NC2ContentBg.X + 20
            Y: =NC2GridCard.Y + NC2GridCard.Height + 20
      - NC2ErrorTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =22
            Size: =11
            Text: ="COMPUTED DEVIATION"
            Width: =NC2ErrorCard.Width - 40
            X: =NC2ErrorCard.X + 20
            Y: =NC2ErrorCard.Y + 12
      - NC2AbsErrorValue:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(50, 49, 48, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Size: =26
            Text: |-
              =If(
                  IsBlank(NC2P1Measured.Text) && IsBlank(NC2P2Measured.Text),
                  "—  abs",
                  Text(
                      Max(
                          Abs(Coalesce(Value(NC2P1Measured.Text), 0) - Coalesce(Value(NC2P1Expected.Text), 0)),
                          Abs(Coalesce(Value(NC2P2Measured.Text), 0) - Coalesce(Value(NC2P2Expected.Text), 0))
                      ),
                      "0.0000"
                  ) & "  abs"
              )
            Width: =(NC2ErrorCard.Width - 60) / 2
            X: =NC2ErrorCard.X + 20
            Y: =NC2ErrorTitle.Y + NC2ErrorTitle.Height + 4
      - NC2PctErrorValue:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: |-
              =With(
                  { range: Abs(Coalesce(Value(NC2P2Expected.Text), 0) - Coalesce(Value(NC2P1Expected.Text), 0)),
                    err: Max(
                        Abs(Coalesce(Value(NC2P1Measured.Text), 0) - Coalesce(Value(NC2P1Expected.Text), 0)),
                        Abs(Coalesce(Value(NC2P2Measured.Text), 0) - Coalesce(Value(NC2P2Expected.Text), 0))
                    ) },
                  If(range = 0, RGBA(96, 94, 92, 1),
                     With({ pct: err / range * 100 },
                         If(pct < 1, RGBA(16, 124, 16, 1),
                            If(pct < 3, RGBA(204, 152, 0, 1), RGBA(196, 49, 75, 1)))))
              )
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Size: =26
            Text: |-
              =With(
                  { range: Abs(Coalesce(Value(NC2P2Expected.Text), 0) - Coalesce(Value(NC2P1Expected.Text), 0)),
                    err: Max(
                        Abs(Coalesce(Value(NC2P1Measured.Text), 0) - Coalesce(Value(NC2P1Expected.Text), 0)),
                        Abs(Coalesce(Value(NC2P2Measured.Text), 0) - Coalesce(Value(NC2P2Expected.Text), 0))
                    ) },
                  If(range = 0, "—  % range",
                     Text(err / range * 100, "0.000") & "  % range")
              )
            Width: =(NC2ErrorCard.Width - 60) / 2
            X: =NC2ErrorCard.X + 40 + (NC2ErrorCard.Width - 60) / 2
            Y: =NC2AbsErrorValue.Y
      - NC2NextButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(16, 124, 16, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(14, 105, 14, 1)
            OnSelect: |-
              =Set(varAbsError,
                  Max(
                      Abs(Coalesce(Value(NC2P1Measured.Text), 0) - Coalesce(Value(NC2P1Expected.Text), 0)),
                      Abs(Coalesce(Value(NC2P2Measured.Text), 0) - Coalesce(Value(NC2P2Expected.Text), 0))
                  )
              );
              Set(varErrorPctSpan,
                  With(
                      { range: Abs(Coalesce(Value(NC2P2Expected.Text), 0) - Coalesce(Value(NC2P1Expected.Text), 0)) },
                      If(range = 0, 0, varAbsError / range * 100)
                  )
              );
              Navigate(NewCal_Equipment, ScreenTransition.None)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(10, 85, 10, 1)
            Text: |-
              ="Next: Equipment  >"
            Width: =(NC2ContentBg.Width - 60) / 2
            X: =NC2ContentBg.X + 40 + (NC2ContentBg.Width - 60) / 2
            Y: =NC2ErrorCard.Y + NC2ErrorCard.Height + 20
      - NC2PrevButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(50, 49, 48, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(247, 247, 246, 1)
            OnSelect: =Back()
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(237, 237, 236, 1)
            Text: ="<  Previous"
            Width: =(NC2ContentBg.Width - 60) / 2
            X: =NC2ContentBg.X + 20
            Y: =NC2NextButton.Y
