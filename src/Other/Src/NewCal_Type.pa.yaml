Screens:
  NewCal_Type:
    Properties:
      Fill: =RGBA(243, 242, 241, 1)
      LoadingSpinnerColor: =RGBA(0, 51, 102, 1)
      OnVisible: =Set(varCalStep, 1)
    Children:
      - NCTHeaderBar:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(16, 124, 16, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =80
            PaddingLeft: =100
            Size: =20
            Text: ="New Calibration"
            Width: =Parent.Width
      - NCTBackButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(255, 255, 255, 0.4)
            BorderThickness: =1
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(255, 255, 255, 0.1)
            OnSelect: =Back()
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(255, 255, 255, 0.2)
            Size: =13
            Text: ="<  Cancel"
            Width: =80
            X: =16
            Y: =20
      - NCTStepText:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =30
            PaddingRight: =20
            Text: ="Step 1 of 4 — Calibration Type"
            Width: =340
            X: =Parent.Width - Self.Width
            Y: =25
      - NCTStep1Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(16, 124, 16, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =Min((Parent.Width - 80) / 4, 180)
            X: =(Parent.Width - Self.Width * 4 - 24) / 2
            Y: =NCTHeaderBar.Y + NCTHeaderBar.Height + 12
      - NCTStep2Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(225, 223, 221, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =NCTStep1Dot.Width
            X: =NCTStep1Dot.X + NCTStep1Dot.Width + 8
            Y: =NCTStep1Dot.Y
      - NCTStep3Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(225, 223, 221, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =NCTStep1Dot.Width
            X: =NCTStep2Dot.X + NCTStep2Dot.Width + 8
            Y: =NCTStep1Dot.Y
      - NCTStep4Dot:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(225, 223, 221, 1)
            Font: =Font.'Open Sans'
            Height: =4
            Size: =14
            Text: =""
            Width: =NCTStep1Dot.Width
            X: =NCTStep3Dot.X + NCTStep3Dot.Width + 8
            Y: =NCTStep1Dot.Y
      - NCTContentBg:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Open Sans'
            Height: =Parent.Height - NCTHeaderBar.Height - 80
            Size: =14
            Text: =""
            Width: =Min(Parent.Width, 880)
            X: =(Parent.Width - Self.Width) / 2
            Y: =NCTHeaderBar.Y + NCTHeaderBar.Height + 60
      - NCTPrompt:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(50, 49, 48, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =34
            Size: =18
            Text: ="What kind of calibration are you logging?"
            Width: =NCTContentBg.Width
            X: =NCTContentBg.X
            Y: =NCTContentBg.Y
      - NCT5pCard:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =180
            Size: =14
            Text: =""
            Width: =(NCTContentBg.Width - 60) / 2
            X: =NCTContentBg.X + 20
            Y: =NCTPrompt.Y + NCTPrompt.Height + 20
      - NCT5pTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(16, 124, 16, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =34
            Size: =18
            Text: ="5-Point Calibration"
            Width: =NCT5pCard.Width - 40
            X: =NCT5pCard.X + 20
            Y: =NCT5pCard.Y + 24
      - NCT5pBody:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =91
            Text: |-
              ="Standard full-scale check: rising and falling outputs at 0%, 25%, 50%, 75% and 100% of the input range."
            Width: =230
            X: =NCT5pCard.X + 20
            Y: =NCT5pTitle.Y + NCT5pTitle.Height + 6
      - NCT5pClick:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 0)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Height: =NCT5pCard.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(16, 124, 16, 0.05)
            OnSelect: |-
              =Set(varCalType, "5-Point");
              Navigate(NewCal_Setup, ScreenTransition.None)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(16, 124, 16, 0.1)
            Size: =1
            Text: =""
            Width: =NCT5pCard.Width
            X: =NCT5pCard.X
            Y: =NCT5pCard.Y
      - NCT2pCard:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =180
            Size: =14
            Text: =""
            Width: =NCT5pCard.Width
            X: =NCT5pCard.X + NCT5pCard.Width + 20
            Y: =NCT5pCard.Y
      - NCT2pTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(16, 124, 16, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =34
            Size: =18
            Text: ="2-Point Calibration"
            Width: =NCT2pCard.Width - 40
            X: =NCT2pCard.X + 20
            Y: =NCT2pCard.Y + 24
      - NCT2pBody:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =91
            Text: |-
              ="Endpoint check only: rising and falling outputs at 0% and 100% of the input range."
            Width: =230
            X: =NCT2pCard.X + 20
            Y: =NCT2pTitle.Y + NCT2pTitle.Height + 6
      - NCT2pClick:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 0)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Height: =NCT2pCard.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(16, 124, 16, 0.05)
            OnSelect: |-
              =Set(varCalType, "2-Point");
              Navigate(NewCal_Setup, ScreenTransition.None)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(16, 124, 16, 0.1)
            Size: =1
            Text: =""
            Width: =NCT2pCard.Width
            X: =NCT2pCard.X
            Y: =NCT2pCard.Y
      - NCTZeroCard:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =180
            Size: =14
            Text: =""
            Width: =NCT5pCard.Width
            X: =NCT5pCard.X
            Y: =NCT5pCard.Y + NCT5pCard.Height + 20
      - NCTZeroTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(0, 120, 212, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =34
            Size: =18
            Text: ="Zero Adjust"
            Width: =NCTZeroCard.Width - 40
            X: =NCTZeroCard.X + 20
            Y: =412
      - NCTZeroBody:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =128
            Text: ="Record the observed mA at zero input. The drift from 4 mA is calculated and stored as a signed value showing which way the transducer is drifting."
            Width: =230
            X: =NCTZeroCard.X + 20
            Y: =446
      - NCTZeroClick:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 0)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Height: =NCTZeroCard.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(0, 120, 212, 0.05)
            OnSelect: |-
              =Set(varCalType, "Zero Adjust");
              Navigate(NewCal_Setup, ScreenTransition.None)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(0, 120, 212, 0.1)
            Size: =1
            Text: =""
            Width: =NCTZeroCard.Width
            X: =NCTZeroCard.X
            Y: =NCTZeroCard.Y
      - NCTSpanCard:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(225, 223, 221, 1)
            BorderThickness: =1
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Open Sans'
            Height: =180
            Size: =14
            Text: =""
            Width: =NCT5pCard.Width
            X: =NCT2pCard.X
            Y: =NCTZeroCard.Y
      - NCTSpanTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(0, 120, 212, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =34
            Size: =18
            Text: ="Span Adjust"
            Width: =NCTSpanCard.Width - 40
            X: =NCTSpanCard.X + 20
            Y: =412
      - NCTSpanBody:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(96, 94, 92, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Segoe UI'
            Height: =105
            Text: ="Re-range the device by entering a new LRV and/or URV. The new range is written to the cal record and pushed to the device list."
            Width: =230
            X: =NCTSpanCard.X + 20
            Y: =446
      - NCTSpanClick:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 0)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Height: =NCTSpanCard.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(0, 120, 212, 0.05)
            OnSelect: |-
              =Set(varCalType, "Span Adjust");
              Navigate(NewCal_Setup, ScreenTransition.None)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(0, 120, 212, 0.1)
            Size: =1
            Text: =""
            Width: =NCTSpanCard.Width
            X: =NCTSpanCard.X
            Y: =NCTSpanCard.Y
