    NCMErrorValue As label:
        BorderColor: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
        Color: |-
            =With(
                { e: Max(
                    Abs(Coalesce(Value(NCRise0.Text), 4) - 4),
                    Abs(Coalesce(Value(NCRise25.Text), 8) - 8),
                    Abs(Coalesce(Value(NCRise50.Text), 12) - 12),
                    Abs(Coalesce(Value(NCRise75.Text), 16) - 16),
                    Abs(Coalesce(Value(NCRise100.Text), 20) - 20),
                    Abs(Coalesce(Value(NCFall0.Text), 4) - 4),
                    Abs(Coalesce(Value(NCFall25.Text), 8) - 8),
                    Abs(Coalesce(Value(NCFall50.Text), 12) - 12),
                    Abs(Coalesce(Value(NCFall75.Text), 16) - 16),
                    Abs(Coalesce(Value(NCFall100.Text), 20) - 20)
                ) / 16 * 100 },
                If(e < 1, RGBA(16, 124, 16, 1),
                   If(e < 3, RGBA(204, 152, 0, 1), RGBA(196, 49, 75, 1)))
            )
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Bold
        Size: =26
        Text: |-
            =Text(
                Max(
                    Abs(Coalesce(Value(NCRise0.Text), 4) - 4),
                    Abs(Coalesce(Value(NCRise25.Text), 8) - 8),
                    Abs(Coalesce(Value(NCRise50.Text), 12) - 12),
                    Abs(Coalesce(Value(NCRise75.Text), 16) - 16),
                    Abs(Coalesce(Value(NCRise100.Text), 20) - 20),
                    Abs(Coalesce(Value(NCFall0.Text), 4) - 4),
                    Abs(Coalesce(Value(NCFall25.Text), 8) - 8),
                    Abs(Coalesce(Value(NCFall50.Text), 12) - 12),
                    Abs(Coalesce(Value(NCFall75.Text), 16) - 16),
                    Abs(Coalesce(Value(NCFall100.Text), 20) - 20)
                ) / 16 * 100,
                "0.000"
            ) & " %  span"
        Width: =(NCMErrorCard.Width - 60) / 2
        X: =NCMErrorCard.X + 20
        Y: =NCMErrorTitle.Y + NCMErrorTitle.Height + 4
        ZIndex: =38

