        Width: =NCEq1Serial.Width
        X: =NCEq1Serial.X
        Y: =NCEq1Serial.Y + NCEq1Serial.Height + 4
        ZIndex: =21

    NCEEq1DateHint As label:
        BorderColor: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
        Color: =RGBA(96, 94, 92, 1)
        Font: =Font.'Segoe UI'
        Height: =22
        Size: =11
        Text: ="CAL DATE"
        Width: =NCEq1Date.Width
        X: =NCEq1Date.X
        Y: =NCEq1Date.Y + NCEq1Date.Height + 4
        ZIndex: =22

    NCEEq1DueHint As label:
