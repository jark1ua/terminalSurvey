        Color: =RGBA(50, 49, 48, 1)
        Font: =Font.'Segoe UI'
        IconBackground: =RGBA(16, 124, 16, 1)
        IsEditable: =true
        PaddingLeft: =6
        Size: =13
        StartYear: =1999
        Width: =NCEq2Serial.Width
        X: =NCEq2Serial.X + NCEq2Serial.Width + 16
