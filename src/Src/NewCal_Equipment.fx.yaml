        Height: =22
        Size: =11
        Text: ="CAL DUE"
        Width: =NCEq2Due.Width
        X: =NCEq2Due.X
        Y: =NCEq2Due.Y + NCEq2Due.Height + 4
        ZIndex: =33

    NCEEq2CertHint As label:
        BorderColor: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
        Color: =RGBA(96, 94, 92, 1)
        Font: =Font.'Segoe UI'
        Height: =22
        Size: =11
        Text: ="CERT NO."
        Width: =NCEq2Cert.Width
        X: =NCEq2Cert.X
        Y: =NCEq2Cert.Y + NCEq2Cert.Height + 4
        ZIndex: =34

    NCESubmitButton As button:
        BorderColor: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
        DisabledFill: =RGBA(225, 223, 221, 1)
        DisplayMode: =If(IsBlank(varCalAsset) || IsBlank(varCalDate), DisplayMode.Disabled, DisplayMode.Edit)
        Fill: =RGBA(16, 124, 16, 1)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Semibold
        Height: =54
        HoverFill: =RGBA(14, 105, 14, 1)
        OnSelect: |-
            =Switch(
                varCalType,
                "5-Point",
                    Patch(
                        'Device Calibration Data List - Seal Sands',
                        Defaults('Device Calibration Data List - Seal Sands'),
                        {
                            Asset: { Id: varCalAsset.ID, Value: varCalAsset.Title },
                            Date: Today(),
                            'Calibrated By': User().FullName,
                            'Calibration Type': { Value: varCalType },
                            'Error (% Span)': Float(varErrorPctSpan),
                            'Error (Absolute)': Float(varAbsError),
                            'LRV at cal.': Coalesce(varCalAsset.LRV, 0),
                            'URV at cal.': Coalesce(varCalAsset.URV, 0),
                            '0% Input': Coalesce(Value(NCIn0.Text), 0),
                            '25% Input': Coalesce(Value(NCIn25.Text), 0),
                            '50% Input': Coalesce(Value(NCIn50.Text), 0),
                            '75% Input': Coalesce(Value(NCIn75.Text), 0),
                            '100% Input': Coalesce(Value(NCIn100.Text), 0),
                            '0% Rising Output (mA)': Coalesce(Value(NCRise0.Text), 0),
                            '25% Rising Output (mA)': Coalesce(Value(NCRise25.Text), 0),
                            '50% Rising Output (mA)': Coalesce(Value(NCRise50.Text), 0),
                            '75% Rising Output (mA)': Coalesce(Value(NCRise75.Text), 0),
                            '100% Rising Output (mA)': Coalesce(Value(NCRise100.Text), 0),
                            '0% Falling Output (mA)': Coalesce(Value(NCFall0.Text), 0),
                            '25% Falling Output (mA)': Coalesce(Value(NCFall25.Text), 0),
                            '50% Falling Output (mA)': Coalesce(Value(NCFall50.Text), 0),
                            '75% Falling Output (mA)': Coalesce(Value(NCFall75.Text), 0),
                            '100% Falling Output (mA)': Coalesce(Value(NCFall100.Text), 0),
                            Comments: NCEComments.Text,
                            'Equipment Used': NCEEquipment.Text,
                            'Calibration Equipment 1 Serial No.': NCEq1Serial.Text,
                            'Calibration Equipment 1 Cal. Date': NCEq1Date.SelectedDate,
                            'Calibration Equipment 1 Cal. Due': NCEq1Due.SelectedDate,
                            'Calibration Equipment 1 Cert. No.': NCEq1Cert.Text,
                            'Calibration Equipment 2 Serial No.': NCEq2Serial.Text,
                            'Calibration Equipment 2 Cal. Date': NCEq2Date.SelectedDate,
                            'Calibration Equipment 2 Cal. Due': NCEq2Due.SelectedDate,
                            'Calibration Equipment 2 Cert. No.': NCEq2Cert.Text
                        },
                        If(IsBlank(varCalStandard), {}, { 'Calibration Standard Used': { Value: varCalStandard } }),
                        If(IsBlank(varCalProcedure), {}, { 'Procedure Used': { Value: varCalProcedure } })
                    ),
                "2-Point",
                    Patch(
                        'Device Calibration Data List - Seal Sands',
                        Defaults('Device Calibration Data List - Seal Sands'),
                        {
                            Asset: { Id: varCalAsset.ID, Value: varCalAsset.Title },
                            Date: varCalDate,
                            'Calibrated By': User().FullName,
                            'Calibration Type': { Value: varCalType },
                            'Error (Absolute)': Float(varAbsError),
                            'LRV at cal.': Coalesce(varCalAsset.LRV, 0),
                            'URV at cal.': Coalesce(varCalAsset.URV, 0),
                            '2-Point Expected Point 1': Coalesce(Value(NC2P1Expected.Text), 0),
                            '2-Point Measured Point 1': Coalesce(Value(NC2P1Measured.Text), 0),
                            '2-Point Expected Point 2': Coalesce(Value(NC2P2Expected.Text), 0),
                            '2-Point Measured Point 2': Coalesce(Value(NC2P2Measured.Text), 0),
                            Comments: NCEComments.Text,
                            'Equipment Used': NCEEquipment.Text,
                            'Calibration Equipment 1 Serial No.': NCEq1Serial.Text,
                            'Calibration Equipment 1 Cal. Date': NCEq1Date.SelectedDate,
                            'Calibration Equipment 1 Cal. Due': NCEq1Due.SelectedDate,
                            'Calibration Equipment 1 Cert. No.': NCEq1Cert.Text,
                            'Calibration Equipment 2 Serial No.': NCEq2Serial.Text,
                            'Calibration Equipment 2 Cal. Date': NCEq2Date.SelectedDate,
                            'Calibration Equipment 2 Cal. Due': NCEq2Due.SelectedDate,
                            'Calibration Equipment 2 Cert. No.': NCEq2Cert.Text
                        },
                        If(IsBlank(varCalStandard), {}, { 'Calibration Standard Used': { Value: varCalStandard } }),
                        If(IsBlank(varCalProcedure), {}, { 'Procedure Used': { Value: varCalProcedure } })
                    ),
                "Zero Adjust",
                    Patch(
                        'Device Calibration Data List - Seal Sands',
                        Defaults('Device Calibration Data List - Seal Sands'),
                        {
                            Asset: { Id: varCalAsset.ID, Value: varCalAsset.Title },
                            Date: varCalDate,
                            'Calibrated By': User().FullName,
                            'Calibration Type': { Value: varCalType },
                            'LRV at cal.': Coalesce(varCalAsset.LRV, 0),
                            'URV at cal.': Coalesce(varCalAsset.URV, 0),
                            'Zero Reading': Coalesce(Value(NCZeroReading.Text), 0),
                            'Zero Adjust': 4 - Coalesce(Value(NCZeroReading.Text), 4),
                            Comments: NCEComments.Text,
                            'Equipment Used': NCEEquipment.Text,
                            'Calibration Equipment 1 Serial No.': NCEq1Serial.Text,
                            'Calibration Equipment 1 Cal. Date': NCEq1Date.SelectedDate,
                            'Calibration Equipment 1 Cal. Due': NCEq1Due.SelectedDate,
                            'Calibration Equipment 1 Cert. No.': NCEq1Cert.Text,
                            'Calibration Equipment 2 Serial No.': NCEq2Serial.Text,
                            'Calibration Equipment 2 Cal. Date': NCEq2Date.SelectedDate,
                            'Calibration Equipment 2 Cal. Due': NCEq2Due.SelectedDate,
                            'Calibration Equipment 2 Cert. No.': NCEq2Cert.Text
                        },
                        If(IsBlank(varCalStandard), {}, { 'Calibration Standard Used': { Value: varCalStandard } }),
                        If(IsBlank(varCalProcedure), {}, { 'Procedure Used': { Value: varCalProcedure } })
                    ),
                "Span Adjust",
                    Patch(
                        'Device Calibration Data List - Seal Sands',
                        Defaults('Device Calibration Data List - Seal Sands'),
                        {
                            Asset: { Id: varCalAsset.ID, Value: varCalAsset.Title },
                            Date: varCalDate,
                            'Calibrated By': User().FullName,
                            'Calibration Type': { Value: varCalType },
                            'LRV at cal.': Coalesce(varCalAsset.LRV, 0),
                            'URV at cal.': Coalesce(varCalAsset.URV, 0),
                            Comments: NCEComments.Text,
                            'Equipment Used': NCEEquipment.Text,
                            'Calibration Equipment 1 Serial No.': NCEq1Serial.Text,
                            'Calibration Equipment 1 Cal. Date': NCEq1Date.SelectedDate,
                            'Calibration Equipment 1 Cal. Due': NCEq1Due.SelectedDate,
                            'Calibration Equipment 1 Cert. No.': NCEq1Cert.Text,
                            'Calibration Equipment 2 Serial No.': NCEq2Serial.Text,
                            'Calibration Equipment 2 Cal. Date': NCEq2Date.SelectedDate,
                            'Calibration Equipment 2 Cal. Due': NCEq2Due.SelectedDate,
                            'Calibration Equipment 2 Cert. No.': NCEq2Cert.Text
                        },
                        If(IsBlank(varCalStandard), {}, { 'Calibration Standard Used': { Value: varCalStandard } }),
                        If(IsBlank(varCalProcedure), {}, { 'Procedure Used': { Value: varCalProcedure } }),
                        If(IsBlank(varNewLRV), {}, { 'New LRV': Value(varNewLRV) }),
                        If(IsBlank(varNewURV), {}, { 'New URV': Value(varNewURV) })
                    )
            );
            Switch(
                varCalType,
                "5-Point",
                    Patch(
                        'Device Calibration List - Seal Sands',
                        varCalAsset,
                        {
                            'Calibrated Upon': varCalDate,
                            'Calibrated By': User().FullName,
                            'Error (% Span)': Float(varErrorPctSpan)
                        }
                    ),
                "2-Point",
                    Patch(
                        'Device Calibration List - Seal Sands',
                        varCalAsset,
                        {
                            'Calibrated Upon': varCalDate,
                            'Calibrated By': User().FullName
                        }
                    )
            );
            If(
                varCalType = "Span Adjust" && Not IsBlank(varNewLRV),
                Patch('Device Calibration List - Seal Sands', varCalAsset, { LRV: Value(varNewLRV) })
            );
            If(
                varCalType = "Span Adjust" && Not IsBlank(varNewURV),
                Patch('Device Calibration List - Seal Sands', varCalAsset, { URV: Value(varNewURV) })
            );
            Notify(
                Switch(
                    varCalType,
                    "Span Adjust", "Span Adjust recorded for " & varCalAsset.Title & " — new range pushed to device.",
                    "Zero Adjust", "Zero Adjust recorded for " & varCalAsset.Title & " — drift " & Text(4 - Coalesce(Value(NCZeroReading.Text), 4), "+0.0000; -0.0000; 0") & " mA logged.",
                    "2-Point", "2-Point cal recorded for " & varCalAsset.Title & " — max deviation " & Text(varAbsError, "0.0000"),
                    "5-Point recorded for " & varCalAsset.Title & " — Error: " & Text(varErrorPctSpan, "0.000") & "% span (" & Text(varAbsError, "0.0000") & " mA abs)"
                ),
                NotificationType.Success
            );
            Reset(NCAssetDropdown); Reset(NCDatePicker);
            Reset(NCStandardDropdown); Reset(NCProcedureDropdown);
            Reset(NCIn0); Reset(NCRise0); Reset(NCFall0);
            Reset(NCIn25); Reset(NCRise25); Reset(NCFall25);
            Reset(NCIn50); Reset(NCRise50); Reset(NCFall50);
            Reset(NCIn75); Reset(NCRise75); Reset(NCFall75);
            Reset(NCIn100); Reset(NCRise100); Reset(NCFall100);
            Reset(NC2P1Expected); Reset(NC2P1Measured);
            Reset(NC2P2Expected); Reset(NC2P2Measured);
            Reset(NCZeroReading);
            Reset(NCSpanNewLRV); Reset(NCSpanNewURV);
            Reset(NCEComments); Reset(NCEEquipment);
            Reset(NCEq1Serial); Reset(NCEq1Date); Reset(NCEq1Due); Reset(NCEq1Cert);
            Reset(NCEq2Serial); Reset(NCEq2Date); Reset(NCEq2Due); Reset(NCEq2Cert);
            Set(varCalType, "");
            Set(varCalAsset, Blank());
            Set(varCalStandard, "");
            Set(varCalProcedure, "");
            Set(varPrefilledAssetTitle, "");
            Set(varErrorPctSpan, 0);
            Set(varAbsError, 0);
            Set(varNewLRV, "");
            Set(varNewURV, "");
            Set(varQRTag, "");
            Navigate(Home, ScreenTransition.Fade)
        PressedFill: =RGBA(10, 85, 10, 1)
        Size: =15
        Text: ="Submit Calibration"
        Width: =(NCEContentBg.Width - 60) / 2
        X: =NCEContentBg.X + 40 + (NCEContentBg.Width - 60) / 2
        Y: =NCEEq2Card.Y + NCEEq2Card.Height + 20
        ZIndex: =35

