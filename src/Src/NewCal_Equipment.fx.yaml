        BorderStyle: =BorderStyle.None
        Color: =RGBA(96, 94, 92, 1)
        Font: =Font.'Segoe UI'
        Height: =22
        Size: =11
        Text: ="SERIAL"
        Width: =NCEq2Serial.Width
        X: =NCEq2Serial.X
        Y: =NCEq2Serial.Y + NCEq2Serial.Height + 4
