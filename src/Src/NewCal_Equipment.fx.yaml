"NewCal_Equipment As screen.'autoLayout_HeaderFooter_ver1.0'":
    Fill: =RGBA(243, 242, 241, 1)
    OnVisible: =Set(varCalStep, 4)

    NCEHeaderBar As label:
        BorderColor: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
        Color: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(16, 124, 16, 1)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Bold
        Height: =80
        PaddingLeft: =100
        Size: =20
        Text: ="New Calibration"
        Width: =Parent.Width
        ZIndex: =1

    NCEBackButton As button:
        BorderColor: =RGBA(255, 255, 255, 0.4)
        BorderThickness: =1
        Fill: =RGBA(0, 0, 0, 0)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Semibold
        HoverFill: =RGBA(255, 255, 255, 0.1)
        OnSelect: =Back()
        PressedFill: =RGBA(255, 255, 255, 0.2)
        Text: ="<  Back"
        Width: =80
        X: =16
        Y: =20
        ZIndex: =2

    NCEStepText As label:
        Align: =Align.Right
        BorderColor: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Height: =30
        PaddingRight: =20
        Size: =13
        Text: =If(IsBlank(varCalAsset), "Step 4 of 4 — Equipment & Submit", "Step 4 of 4 — " & varCalType & " — " & varCalAsset.Title)
        Width: =500
        X: =Parent.Width - Self.Width
        Y: =25
        ZIndex: =3

    NCEStep1Dot As label:
        BorderColor: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
        Fill: =RGBA(16, 124, 16, 1)
        Height: =4
        Text: =""
        Width: =Min((Parent.Width - 80) / 4, 180)
        X: =(Parent.Width - Self.Width * 4 - 24) / 2
        Y: =NCEHeaderBar.Y + NCEHeaderBar.Height + 12
        ZIndex: =4

    NCEStep2Dot As label:
