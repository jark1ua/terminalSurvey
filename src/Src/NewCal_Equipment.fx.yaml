        StartYear: =1999
        Width: =NCEq2Serial.Width
        X: =If(App.Width < 600, NCEq2Serial.X, NCEq2Date.X + NCEq2Date.Width + 12)
        Y: =If(App.Width < 600, NCEq2Serial.Y + NCEq2Serial.Height + 30, NCEq2Serial.Y)
        ZIndex: =29

    NCEq2Cert As text:
        BorderColor: =RGBA(225, 223, 221, 1)
        Color: =RGBA(50, 49, 48, 1)
        Default: =""
        Font: =Font.'Segoe UI'
        Height: =44
        HintText: ="Cert No."
        PaddingLeft: =10
        Size: =13
        Width: =NCEq2Serial.Width
        X: =If(App.Width < 600, NCEq2Date.X, NCEq2Due.X + NCEq2Due.Width + 12)
        Y: =If(App.Width < 600, NCEq2Due.Y, NCEq2Serial.Y)
